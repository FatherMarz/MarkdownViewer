<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Markdown Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
<style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        padding: 32px 48px 64px;
        max-width: 900px;
        margin: 0 auto;
    }
    .markdown-body {
        background: transparent !important;
        color: inherit;
        font-size: 15px;
    }
    @media (prefers-color-scheme: dark) {
        body { background: #1e1e1e; color: #e6e6e6; }
        .markdown-body { color-scheme: dark; }
    }
    mark.find-hit {
        background-color: rgba(255, 220, 0, 0.45);
        color: inherit;
        padding: 0;
        border-radius: 2px;
    }
    mark.find-hit.active {
        background-color: rgba(255, 140, 0, 0.8);
        color: #1a1a1a;
    }
    #content:empty::before {
        content: "Open a markdown file to begin.";
        color: #888;
        font-style: italic;
    }
    .fm-block {
        margin: 0 0 28px;
        padding: 0 0 20px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.25);
    }
    .fm-title {
        margin: 0 0 8px;
        font-size: 2em;
        line-height: 1.2;
        border-bottom: none !important;
        padding-bottom: 0 !important;
    }
    .fm-meta {
        color: #666;
        font-size: 0.95em;
        margin-bottom: 10px;
    }
    @media (prefers-color-scheme: dark) {
        .fm-meta { color: #9a9a9a; }
    }
    .fm-tags { margin-bottom: 12px; }
    .fm-tag {
        display: inline-block;
        background: rgba(128, 128, 128, 0.18);
        padding: 2px 9px;
        border-radius: 10px;
        font-size: 0.82em;
        margin-right: 6px;
        color: inherit;
    }
    .fm-excerpt {
        font-style: italic;
        color: #555;
        margin: 0;
    }
    @media (prefers-color-scheme: dark) {
        .fm-excerpt { color: #bbb; }
    }
    .mdx-unhandled {
        display: inline-block;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
        background: rgba(255, 180, 0, 0.18);
        border: 1px dashed rgba(180, 120, 0, 0.5);
        color: inherit;
        padding: 1px 6px;
        border-radius: 4px;
    }
</style>
</head>
<body>
<article id="content" class="markdown-body"></article>
<script>
    function applyTheme() {
        const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.getElementById("hljs-light").disabled = dark;
        document.getElementById("hljs-dark").disabled = !dark;
    }
    applyTheme();
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);

    marked.setOptions({
        gfm: true,
        breaks: false,
        highlight: function(code, lang) {
            if (window.hljs && lang && hljs.getLanguage(lang)) {
                try { return hljs.highlight(code, { language: lang }).value; } catch (_) {}
            }
            return window.hljs ? hljs.highlightAuto(code).value : code;
        }
    });

    let _suppressScroll = false;
    window.scrollToFraction = function(fraction) {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;
        _suppressScroll = true;
        window.scrollTo(0, max * fraction);
        requestAnimationFrame(function() { _suppressScroll = false; });
    };
    window.addEventListener("scroll", function() {
        if (_suppressScroll) return;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;
        const frac = Math.min(1, Math.max(0, window.scrollY / max));
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.scroll) {
            window.webkit.messageHandlers.scroll.postMessage(frac);
        }
    }, { passive: true });

    let _currentQuery = "";
    let _currentOptions = { caseSensitive: false, wholeWord: false, useRegex: false };
    let _matches = [];
    let _activeIndex = -1;

    function _decode(b64) {
        try { return decodeURIComponent(escape(atob(b64))); } catch (_) { return ""; }
    }

    function _clearMarks() {
        document.querySelectorAll("mark.find-hit").forEach(function(el) {
            const parent = el.parentNode;
            if (!parent) return;
            parent.replaceChild(document.createTextNode(el.textContent), el);
            parent.normalize();
        });
        _matches = [];
        _activeIndex = -1;
    }

    function _buildRegex() {
        if (!_currentQuery) return null;
        let pattern = _currentOptions.useRegex
            ? _currentQuery
            : _currentQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        if (_currentOptions.wholeWord) pattern = "(?:\\b)" + pattern + "(?:\\b)";
        const flags = "g" + (_currentOptions.caseSensitive ? "" : "i");
        try { return new RegExp(pattern, flags); } catch (_) { return null; }
    }

    function _applyHighlights() {
        _clearMarks();
        if (!_currentQuery) return;
        const re = _buildRegex();
        if (!re) return;
        const root = document.getElementById("content");
        if (!root) return;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                const p = node.parentElement;
                if (!p) return NodeFilter.FILTER_REJECT;
                if (p.tagName === "SCRIPT" || p.tagName === "STYLE" || p.classList.contains("find-hit")) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes = [];
        let n;
        while ((n = walker.nextNode())) nodes.push(n);
        nodes.forEach(function(textNode) {
            const text = textNode.nodeValue;
            re.lastIndex = 0;
            if (!re.test(text)) return;
            re.lastIndex = 0;
            const frag = document.createDocumentFragment();
            let last = 0;
            let m;
            while ((m = re.exec(text)) !== null) {
                if (m.index > last) {
                    frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                }
                const mark = document.createElement("mark");
                mark.className = "find-hit";
                mark.textContent = m[0];
                frag.appendChild(mark);
                _matches.push(mark);
                last = m.index + m[0].length;
                if (m[0].length === 0) re.lastIndex++;
            }
            if (last < text.length) {
                frag.appendChild(document.createTextNode(text.slice(last)));
            }
            if (textNode.parentNode) textNode.parentNode.replaceChild(frag, textNode);
        });
    }

    function _applyActive() {
        _matches.forEach(function(el) { el.classList.remove("active"); });
        if (_activeIndex < 0 || _activeIndex >= _matches.length) return;
        const el = _matches[_activeIndex];
        el.classList.add("active");
        _suppressScroll = true;
        el.scrollIntoView({ block: "center", inline: "nearest", behavior: "auto" });
        requestAnimationFrame(function() { _suppressScroll = false; });
    }

    window.setFindQuery = function(base64, options) {
        _currentQuery = _decode(base64);
        if (options) _currentOptions = options;
        _applyHighlights();
    };

    window.setFindIndex = function(index) {
        _activeIndex = index;
        _applyActive();
    };

    function _escHtml(s) {
        return String(s).replace(/[&<>"']/g, function(c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
    }

    function _parseFrontmatter(text) {
        const result = {};
        text.split(/\r?\n/).forEach(function(line) {
            const m = line.match(/^([A-Za-z0-9_-]+)\s*:\s*(.*)$/);
            if (!m) return;
            let key = m[1];
            let value = m[2].trim();
            if ((value.startsWith('"') && value.endsWith('"')) ||
                (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }
            if (value.startsWith("[") && value.endsWith("]")) {
                value = value.slice(1, -1)
                    .split(",")
                    .map(function(s) { return s.trim().replace(/^['"]|['"]$/g, ""); })
                    .filter(Boolean);
            }
            result[key] = value;
        });
        return result;
    }

    function _renderFrontmatter(fm) {
        if (!fm) return "";
        const parts = [];
        if (fm.title) parts.push('<h1 class="fm-title">' + _escHtml(fm.title) + "</h1>");
        const meta = [];
        if (fm.author) meta.push(_escHtml(fm.author));
        if (fm.date) meta.push(_escHtml(fm.date));
        if (meta.length) parts.push('<div class="fm-meta">' + meta.join(" · ") + "</div>");
        if (Array.isArray(fm.tags) && fm.tags.length) {
            const tagHtml = fm.tags.map(function(t) {
                return '<span class="fm-tag">' + _escHtml(t) + "</span>";
            }).join("");
            parts.push('<div class="fm-tags">' + tagHtml + "</div>");
        }
        if (fm.excerpt) parts.push('<p class="fm-excerpt">' + _escHtml(fm.excerpt) + "</p>");
        return parts.length ? '<header class="fm-block">' + parts.join("\n") + "</header>" : "";
    }

    function _preprocessMdx(md) {
        let frontmatter = null;
        const fmMatch = md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
        if (fmMatch) {
            frontmatter = _parseFrontmatter(fmMatch[1]);
            md = md.slice(fmMatch[0].length);
        }
        md = md.replace(/^[ \t]*(?:import|export)\s+[^\n]*\n?/gm, "");
        md = md.replace(/<([A-Z][A-Za-z0-9]*)([^>]*)\/>/g, function(_, name, attrs) {
            return '<span class="mdx-unhandled">&lt;' + name + (attrs || "") + " /&gt;</span>";
        });
        return { frontmatter: frontmatter, body: md };
    }

    window.renderMarkdown = function(base64) {
        try {
            const raw = _decode(base64);
            const pre = _preprocessMdx(raw);
            const header = _renderFrontmatter(pre.frontmatter);
            document.getElementById("content").innerHTML = header + marked.parse(pre.body);
            document.querySelectorAll("pre code").forEach(function(block) {
                if (window.hljs) hljs.highlightElement(block);
            });
            document.querySelectorAll('a[href^="http"]').forEach(function(a) {
                a.setAttribute("target", "_blank");
            });
            if (_currentQuery) {
                _applyHighlights();
                _applyActive();
            }
        } catch (err) {
            document.getElementById("content").textContent = "Render error: " + err.message;
        }
    };
</script>
</body>
</html>
