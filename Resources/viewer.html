<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Markdown Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
<style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        padding: 32px 48px 64px;
        max-width: 900px;
        margin: 0 auto;
    }
    .markdown-body {
        background: transparent !important;
        color: inherit;
        font-size: 15px;
    }
    @media (prefers-color-scheme: dark) {
        body { background: #1e1e1e; color: #e6e6e6; }
        .markdown-body { color-scheme: dark; }
    }
    mark.find-hit {
        background-color: rgba(255, 220, 0, 0.45);
        color: inherit;
        padding: 0;
        border-radius: 2px;
    }
    mark.find-hit.active {
        background-color: rgba(255, 140, 0, 0.8);
        color: #1a1a1a;
    }
    #content:empty::before {
        content: "Open a markdown file to begin.";
        color: #888;
        font-style: italic;
    }
    .fm-block {
        margin: 0 0 28px;
        padding: 0 0 20px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.25);
        user-select: none;
        -webkit-user-select: none;
    }
    .fm-title {
        margin: 0 0 8px;
        font-size: 2em;
        line-height: 1.2;
        border-bottom: none !important;
        padding-bottom: 0 !important;
    }
    .fm-meta {
        color: #666;
        font-size: 0.95em;
        margin-bottom: 10px;
    }
    @media (prefers-color-scheme: dark) {
        .fm-meta { color: #9a9a9a; }
    }
    .fm-tags { margin-bottom: 12px; }
    .fm-tag {
        display: inline-block;
        background: rgba(128, 128, 128, 0.18);
        padding: 2px 9px;
        border-radius: 10px;
        font-size: 0.82em;
        margin-right: 6px;
        color: inherit;
    }
    .fm-excerpt {
        font-style: italic;
        color: #555;
        margin: 0;
    }
    @media (prefers-color-scheme: dark) {
        .fm-excerpt { color: #bbb; }
    }
    .mdx-unhandled {
        display: inline-block;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
        background: rgba(255, 180, 0, 0.18);
        border: 1px dashed rgba(180, 120, 0, 0.5);
        color: inherit;
        padding: 1px 6px;
        border-radius: 4px;
    }

    /* Mermaid */
    .mermaid {
        background: transparent !important;
        text-align: center;
        margin: 20px 0;
        padding: 12px;
        border: 1px solid rgba(128, 128, 128, 0.2);
        border-radius: 8px;
        overflow-x: auto;
    }
    .mermaid svg { max-width: 100%; height: auto; }
    .mermaid.mermaid-error {
        color: #b85450;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
        text-align: left;
        white-space: pre-wrap;
    }

    /* GitHub-style alerts */
    .markdown-alert {
        padding: 8px 16px;
        margin-bottom: 16px;
        border-left: 4px solid;
        border-radius: 4px;
        background: rgba(128, 128, 128, 0.06);
    }
    .markdown-alert > :first-child { margin-top: 0; }
    .markdown-alert > :last-child { margin-bottom: 0; }
    .markdown-alert-title {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        margin-bottom: 4px;
        text-transform: capitalize;
    }
    .markdown-alert-title svg { width: 16px; height: 16px; fill: currentColor; }
    .markdown-alert-note { border-color: #0969da; }
    .markdown-alert-note .markdown-alert-title { color: #0969da; }
    .markdown-alert-tip { border-color: #1a7f37; }
    .markdown-alert-tip .markdown-alert-title { color: #1a7f37; }
    .markdown-alert-important { border-color: #8250df; }
    .markdown-alert-important .markdown-alert-title { color: #8250df; }
    .markdown-alert-warning { border-color: #9a6700; }
    .markdown-alert-warning .markdown-alert-title { color: #9a6700; }
    .markdown-alert-caution { border-color: #cf222e; }
    .markdown-alert-caution .markdown-alert-title { color: #cf222e; }
    @media (prefers-color-scheme: dark) {
        .markdown-alert-note { border-color: #4493f8; }
        .markdown-alert-note .markdown-alert-title { color: #4493f8; }
        .markdown-alert-tip { border-color: #3fb950; }
        .markdown-alert-tip .markdown-alert-title { color: #3fb950; }
        .markdown-alert-important { border-color: #ab7df8; }
        .markdown-alert-important .markdown-alert-title { color: #ab7df8; }
        .markdown-alert-warning { border-color: #d29922; }
        .markdown-alert-warning .markdown-alert-title { color: #d29922; }
        .markdown-alert-caution { border-color: #f85149; }
        .markdown-alert-caution .markdown-alert-title { color: #f85149; }
    }

    /* Code block copy button */
    .code-block-wrap {
        position: relative;
    }
    .code-copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 4px 10px;
        font-size: 11px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: inherit;
        background: rgba(128, 128, 128, 0.18);
        border: 1px solid rgba(128, 128, 128, 0.3);
        border-radius: 5px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 120ms ease;
    }
    .code-block-wrap:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn:hover { background: rgba(128, 128, 128, 0.3); }
    .code-copy-btn.copied { color: #1a7f37; }
    @media (prefers-color-scheme: dark) {
        .code-copy-btn.copied { color: #3fb950; }
    }

    /* Heading permalinks */
    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
        position: relative;
    }
    .heading-anchor {
        position: absolute;
        left: -22px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        text-decoration: none !important;
        color: #888 !important;
        font-weight: normal;
        transition: opacity 120ms ease;
        user-select: none;
        -webkit-user-select: none;
    }
    .markdown-body h1:hover .heading-anchor,
    .markdown-body h2:hover .heading-anchor,
    .markdown-body h3:hover .heading-anchor,
    .markdown-body h4:hover .heading-anchor,
    .markdown-body h5:hover .heading-anchor,
    .markdown-body h6:hover .heading-anchor {
        opacity: 1;
    }
</style>
</head>
<body>
<article id="content" class="markdown-body"></article>
<script>
    function _isDark() {
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }

    function _initMermaid() {
        if (!window.mermaid) return;
        mermaid.initialize({
            startOnLoad: false,
            theme: _isDark() ? "dark" : "default",
            securityLevel: "loose",
            flowchart: { htmlLabels: true, useMaxWidth: true },
            er: { useMaxWidth: true },
            sequence: { useMaxWidth: true }
        });
    }

    function applyTheme() {
        const dark = _isDark();
        document.getElementById("hljs-light").disabled = dark;
        document.getElementById("hljs-dark").disabled = !dark;
        _initMermaid();
        _rerenderMermaid();
    }
    _initMermaid();
    applyTheme();
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);

    marked.use({
        renderer: {
            code(code, infoString, escaped) {
                const lang = (infoString || "").match(/^\S*/)[0];
                if (lang === "mermaid") {
                    return '<pre class="mermaid">' + _escHtml(code) + "</pre>";
                }
                return false;
            }
        }
    });

    marked.setOptions({
        gfm: true,
        breaks: false,
        highlight: function(code, lang) {
            if (lang === "mermaid") return code;
            if (window.hljs && lang && hljs.getLanguage(lang)) {
                try { return hljs.highlight(code, { language: lang }).value; } catch (_) {}
            }
            return window.hljs ? hljs.highlightAuto(code).value : code;
        }
    });

    let _currentZoom = 1.0;
    window.setZoom = function(factor) {
        const f = Math.max(0.5, Math.min(3.0, Number(factor) || 1.0));
        if (Math.abs(f - _currentZoom) < 0.0001) return;
        const ratio = f / _currentZoom;
        const prevY = window.scrollY;
        const prevX = window.scrollX;
        document.documentElement.style.zoom = f;
        _currentZoom = f;
        window.scrollTo(prevX * ratio, prevY * ratio);
    };

    let _suppressScroll = false;
    window.scrollToFraction = function(fraction) {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;
        _suppressScroll = true;
        window.scrollTo(0, max * fraction);
        requestAnimationFrame(function() { _suppressScroll = false; });
    };
    window.addEventListener("scroll", function() {
        if (_suppressScroll) return;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;
        const frac = Math.min(1, Math.max(0, window.scrollY / max));
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.scroll) {
            window.webkit.messageHandlers.scroll.postMessage(frac);
        }
    }, { passive: true });

    let _currentQuery = "";
    let _currentOptions = { caseSensitive: false, wholeWord: false, useRegex: false };
    let _matches = [];
    let _activeIndex = -1;

    function _decode(b64) {
        try { return decodeURIComponent(escape(atob(b64))); } catch (_) { return ""; }
    }

    function _clearMarks() {
        document.querySelectorAll("mark.find-hit").forEach(function(el) {
            const parent = el.parentNode;
            if (!parent) return;
            parent.replaceChild(document.createTextNode(el.textContent), el);
            parent.normalize();
        });
        _matches = [];
        _activeIndex = -1;
    }

    function _buildRegex() {
        if (!_currentQuery) return null;
        let pattern = _currentOptions.useRegex
            ? _currentQuery
            : _currentQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        if (_currentOptions.wholeWord) pattern = "(?:\\b)" + pattern + "(?:\\b)";
        const flags = "g" + (_currentOptions.caseSensitive ? "" : "i");
        try { return new RegExp(pattern, flags); } catch (_) { return null; }
    }

    function _applyHighlights() {
        _clearMarks();
        if (!_currentQuery) return;
        const re = _buildRegex();
        if (!re) return;
        const root = document.getElementById("content");
        if (!root) return;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                const p = node.parentElement;
                if (!p) return NodeFilter.FILTER_REJECT;
                if (p.tagName === "SCRIPT" || p.tagName === "STYLE" || p.classList.contains("find-hit")) {
                    return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        const nodes = [];
        let n;
        while ((n = walker.nextNode())) nodes.push(n);
        nodes.forEach(function(textNode) {
            const text = textNode.nodeValue;
            re.lastIndex = 0;
            if (!re.test(text)) return;
            re.lastIndex = 0;
            const frag = document.createDocumentFragment();
            let last = 0;
            let m;
            while ((m = re.exec(text)) !== null) {
                if (m.index > last) {
                    frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                }
                const mark = document.createElement("mark");
                mark.className = "find-hit";
                mark.textContent = m[0];
                frag.appendChild(mark);
                _matches.push(mark);
                last = m.index + m[0].length;
                if (m[0].length === 0) re.lastIndex++;
            }
            if (last < text.length) {
                frag.appendChild(document.createTextNode(text.slice(last)));
            }
            if (textNode.parentNode) textNode.parentNode.replaceChild(frag, textNode);
        });
    }

    function _applyActive() {
        _matches.forEach(function(el) { el.classList.remove("active"); });
        if (_activeIndex < 0 || _activeIndex >= _matches.length) return;
        const el = _matches[_activeIndex];
        el.classList.add("active");
        _suppressScroll = true;
        el.scrollIntoView({ block: "center", inline: "nearest", behavior: "auto" });
        requestAnimationFrame(function() { _suppressScroll = false; });
    }

    window.setFindQuery = function(base64, options) {
        _currentQuery = _decode(base64);
        if (options) _currentOptions = options;
        _applyHighlights();
    };

    window.setFindIndex = function(index) {
        _activeIndex = index;
        _applyActive();
    };

    function _escHtml(s) {
        return String(s).replace(/[&<>"']/g, function(c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
    }

    function _parseFrontmatter(text) {
        const result = {};
        text.split(/\r?\n/).forEach(function(line) {
            const m = line.match(/^([A-Za-z0-9_-]+)\s*:\s*(.*)$/);
            if (!m) return;
            let key = m[1];
            let value = m[2].trim();
            if ((value.startsWith('"') && value.endsWith('"')) ||
                (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }
            if (value.startsWith("[") && value.endsWith("]")) {
                value = value.slice(1, -1)
                    .split(",")
                    .map(function(s) { return s.trim().replace(/^['"]|['"]$/g, ""); })
                    .filter(Boolean);
            }
            result[key] = value;
        });
        return result;
    }

    function _renderFrontmatter(fm) {
        if (!fm) return "";
        const parts = [];
        if (fm.title) parts.push('<h1 class="fm-title">' + _escHtml(fm.title) + "</h1>");
        const meta = [];
        if (fm.author) meta.push(_escHtml(fm.author));
        if (fm.date) meta.push(_escHtml(fm.date));
        if (meta.length) parts.push('<div class="fm-meta">' + meta.join(" · ") + "</div>");
        if (Array.isArray(fm.tags) && fm.tags.length) {
            const tagHtml = fm.tags.map(function(t) {
                return '<span class="fm-tag">' + _escHtml(t) + "</span>";
            }).join("");
            parts.push('<div class="fm-tags">' + tagHtml + "</div>");
        }
        if (fm.excerpt) parts.push('<p class="fm-excerpt">' + _escHtml(fm.excerpt) + "</p>");
        return parts.length ? '<header class="fm-block">' + parts.join("\n") + "</header>" : "";
    }

    function _preprocessMdx(md) {
        let frontmatter = null;
        const fmMatch = md.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
        if (fmMatch) {
            frontmatter = _parseFrontmatter(fmMatch[1]);
            md = md.slice(fmMatch[0].length);
        }
        md = md.replace(/^[ \t]*(?:import|export)\s+[^\n]*\n?/gm, "");
        md = md.replace(/<([A-Z][A-Za-z0-9]*)([^>]*)\/>/g, function(_, name, attrs) {
            return '<span class="mdx-unhandled">&lt;' + name + (attrs || "") + " /&gt;</span>";
        });
        return { frontmatter: frontmatter, body: md };
    }

    const _alertIcons = {
        note: '<svg viewBox="0 0 16 16"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>',
        tip: '<svg viewBox="0 0 16 16"><path d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"/></svg>',
        important: '<svg viewBox="0 0 16 16"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>',
        warning: '<svg viewBox="0 0 16 16"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>',
        caution: '<svg viewBox="0 0 16 16"><path d="M4.47.22A.749.749 0 0 1 5 0h6c.199 0 .389.079.53.22l4.25 4.25c.141.14.22.331.22.53v6a.749.749 0 0 1-.22.53l-4.25 4.25A.749.749 0 0 1 11 16H5a.749.749 0 0 1-.53-.22L.22 11.53A.749.749 0 0 1 0 11V5c0-.199.079-.389.22-.53Zm.84 1.28L1.5 5.31v5.38l3.81 3.81h5.38l3.81-3.81V5.31L10.69 1.5ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>'
    };

    function _renderAlerts(root) {
        root.querySelectorAll("blockquote").forEach(function(bq) {
            const first = bq.querySelector(":scope > p:first-child");
            if (!first) return;
            const html = first.innerHTML;
            const m = html.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br\s*\/?>|\n)?/i);
            if (!m) return;
            const type = m[1].toLowerCase();
            bq.classList.add("markdown-alert", "markdown-alert-" + type);
            const remainder = html.slice(m[0].length).replace(/^\s+/, "");
            first.innerHTML = remainder;
            if (!first.textContent.trim() && !first.querySelector("img,code,br")) first.remove();
            const title = document.createElement("p");
            title.className = "markdown-alert-title";
            title.innerHTML = (_alertIcons[type] || "") + "<span>" + type + "</span>";
            bq.insertBefore(title, bq.firstChild);
        });
    }

    function _addCopyButtons(root) {
        root.querySelectorAll("pre > code").forEach(function(code) {
            const pre = code.parentElement;
            if (!pre || pre.parentElement && pre.parentElement.classList.contains("code-block-wrap")) return;
            const wrap = document.createElement("div");
            wrap.className = "code-block-wrap";
            pre.parentNode.insertBefore(wrap, pre);
            wrap.appendChild(pre);
            const btn = document.createElement("button");
            btn.className = "code-copy-btn";
            btn.type = "button";
            btn.textContent = "Copy";
            btn.addEventListener("click", function() {
                const text = code.innerText;
                const done = function() {
                    btn.textContent = "Copied";
                    btn.classList.add("copied");
                    setTimeout(function() {
                        btn.textContent = "Copy";
                        btn.classList.remove("copied");
                    }, 1200);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(done, function() {});
                } else {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand("copy"); done(); } catch (_) {}
                    document.body.removeChild(ta);
                }
            });
            wrap.appendChild(btn);
        });
    }

    function _slugify(text) {
        return String(text).toLowerCase()
            .replace(/[^\w\s-]/g, "")
            .trim()
            .replace(/\s+/g, "-");
    }

    function _addHeadingAnchors(root) {
        const used = {};
        root.querySelectorAll("h1,h2,h3,h4,h5,h6").forEach(function(h) {
            if (h.classList.contains("fm-title")) return;
            let base = _slugify(h.textContent);
            if (!base) return;
            let id = base;
            let n = 1;
            while (used[id]) { id = base + "-" + (++n); }
            used[id] = true;
            h.id = id;
            const a = document.createElement("a");
            a.className = "heading-anchor";
            a.href = "#" + id;
            a.setAttribute("aria-label", "Link to this section");
            a.textContent = "#";
            h.insertBefore(a, h.firstChild);
        });
    }

    function _rerenderMermaid() {
        if (!window.mermaid) return;
        const blocks = document.querySelectorAll(".mermaid[data-source]");
        if (!blocks.length) return;
        blocks.forEach(function(el) {
            el.removeAttribute("data-processed");
            el.classList.remove("mermaid-error");
            el.textContent = el.getAttribute("data-source");
        });
        try {
            mermaid.run({ querySelector: ".mermaid[data-source]" });
        } catch (_) {}
    }

    function _runMermaid(root) {
        if (!window.mermaid) return;
        const blocks = root.querySelectorAll("pre.mermaid");
        if (!blocks.length) return;
        blocks.forEach(function(el) {
            el.setAttribute("data-source", el.textContent);
        });
        try {
            mermaid.run({ querySelector: "pre.mermaid" }).catch(function() {});
        } catch (_) {}
    }

    window.getRichContent = function() {
        const root = document.getElementById("content");
        if (!root) return { html: "", text: "" };
        const clone = root.cloneNode(true);
        clone.querySelectorAll(".heading-anchor, .code-copy-btn, .fm-block").forEach(function(el) {
            el.remove();
        });
        clone.querySelectorAll(".code-block-wrap").forEach(function(wrap) {
            const pre = wrap.querySelector("pre");
            if (pre && wrap.parentNode) {
                wrap.parentNode.replaceChild(pre, wrap);
            }
        });
        const html = "<html><body>" + clone.innerHTML + "</body></html>";
        const text = clone.innerText;
        return { html: html, text: text };
    };

    window.renderMarkdown = function(base64) {
        try {
            const raw = _decode(base64);
            const pre = _preprocessMdx(raw);
            const header = _renderFrontmatter(pre.frontmatter);
            const root = document.getElementById("content");
            root.innerHTML = header + marked.parse(pre.body);
            root.querySelectorAll("pre code").forEach(function(block) {
                if (block.parentElement && block.parentElement.classList.contains("mermaid")) return;
                if (window.hljs) hljs.highlightElement(block);
            });
            _renderAlerts(root);
            _addCopyButtons(root);
            _addHeadingAnchors(root);
            _runMermaid(root);
            if (_currentQuery) {
                _applyHighlights();
                _applyActive();
            }
        } catch (err) {
            document.getElementById("content").textContent = "Render error: " + err.message;
        }
    };
</script>
</body>
</html>
